<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enviar Certificado · SENAC PI 2026</title>
  <link rel="stylesheet" href="../css/enviar.css" />
</head>
<body>

<nav>
  <div class="logo">SENAC · PI 2026</div>
  <div class="nav-links">
    <a href="certificados.html">Meus Certificados</a>
    <a href="enviar.html" class="ativo">Enviar</a>
    <a href="#" onclick="sair()">Sair</a>
  </div>
</nav>

<div class="container">
  <h1>Enviar Certificado</h1>
  <p class="subtitle">Preencha os dados e anexe o arquivo do certificado</p>

  <div class="card">
    <label for="nome">Nome da Atividade</label>
    <input type="text" id="nome" placeholder="Ex: Workshop de Inteligência Artificial" />

    <label for="categoria">Categoria</label>
    <select id="categoria">
      <option value="">Selecione uma categoria</option>
      <option value="palestra">Palestra</option>
      <option value="curso">Curso</option>
      <option value="workshop">Workshop</option>
      <option value="evento">Evento</option>
      <option value="voluntariado">Voluntariado</option>
    </select>

    <label for="horas">Carga Horária (horas)</label>
    <input type="number" id="horas" placeholder="Ex: 8" min="1" max="999" />

    <label for="descricao">Descrição (opcional)</label>
    <textarea id="descricao" placeholder="Descreva brevemente a atividade..."></textarea>

    <label>Arquivo do Certificado (PDF ou imagem)</label>
    <div class="upload-area" onclick="document.getElementById('arquivo-input').click()">
      <p>Clique para selecionar ou arraste o arquivo aqui</p>
      <p><span>PDF, JPG ou PNG · máx. 10 MB</span></p>
    </div>
    <input type="file" id="arquivo-input" accept=".pdf,.jpg,.jpeg,.png" onchange="mostrarArquivo()" />
    <div id="arquivo-nome"></div>

    <button id="btn-enviar" onclick="enviarCertificado()">Enviar Certificado</button>
    <p class="msg" id="msg"></p>
  </div>
</div>

<script src="../js/enviar.js"></script>

</body>
</html>
