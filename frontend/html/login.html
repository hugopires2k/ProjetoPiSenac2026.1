<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · SENAC PI 2026</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="card">
  <div class="logo">SENAC · PI 2026</div>
  <h1>Bem-vindo</h1>
  <p class="subtitle">Faça login para acessar sua conta</p>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />

  <label for="senha">Senha</label>
  <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />

  <button id="btn-login" onclick="fazerLogin()">Entrar</button>

  <p class="msg" id="msg"></p>

  <div class="link">
    Não tem conta? Fale com o administrador.
  </div>
</div>

<script src="../js/login.js"></script>

</body>
</html>
